name: Deploy Gestión Artista → Vercel Production

on:
  push:
    branches:
      - main
    paths:
      - '01_CLIENTES/GESTION_ARTISTA/app/**'
      - '.github/workflows/deploy-gestion-artista.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01_CLIENTES/GESTION_ARTISTA/app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel Production
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
